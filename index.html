<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant-Stock Live Dashboard | Edge Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .ticker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .ticker-card { padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .signal { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .signal.BUY { background: var(--success); color: #064e3b; }
        .signal.SELL { background: var(--danger); color: #7f1d1d; }
        .signal.HOLD { background: var(--warning); color: #78350f; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        .chart-container { height: 400px; width: 100%; }
        .suggested-buys { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .suggested-buys td, .suggested-buys th { padding: 10px; text-align: left; border-top: 1px solid rgba(255,255,255,0.05); }
        .refresh-btn { background: var(--accent); color: var(--bg); border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard-grid">
        <div class="main-panel" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <div class="header">
                    <h1>🚀 Market Edge Scanner</h1>
                    <button class="refresh-btn" onclick="refreshAll()">Scan Now</button>
                </div>
                <div class="ticker-grid" id="ticker-grid"></div>
            </div>
            <div class="card">
                <h1>📈 Cumulative P&L History</h1>
                <div class="chart-container"><canvas id="pnlChart"></canvas></div>
            </div>
        </div>
        <div class="sidebar" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card">
                <h1>💰 Portfolio</h1>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <div class="stat-box"><div style="font-size: 0.7rem; opacity: 0.6;">Realized</div><div class="stat-value" id="realized">$0.00</div></div>
                    <div class="stat-box"><div style="font-size: 0.7rem; opacity: 0.6;">Open</div><div class="stat-value" id="open-pnl">$0.00</div></div>
                </div>
            </div>
            <div class="card">
                <h1>🎯 Active Buys</h1>
                <table class="suggested-buys">
                    <thead><tr><th>Ticker</th><th>Entry</th><th>PnL</th></tr></thead>
                    <tbody id="suggested-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        let pnlChart;
        let pnlHistory = {};

        function initChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            pnlChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } }
                }
            });
        }

        async function refreshAll() {
            const res = await fetch('/api/full');
            const data = await res.json();
            
            // Update Ticker Grid
            const grid = document.getElementById('ticker-grid');
            grid.innerHTML = '';
            data.snapshots.forEach((snap, i) => {
                const edge = data.edges[i];
                grid.innerHTML += `
                    <div class="ticker-card">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${snap.ticker}</strong>
                            <span class="signal ${edge.signal}">${edge.signal}</span>
                        </div>
                        <div style="font-size:1.2rem; font-family:monospace;">$${snap.current_price.toFixed(2)}</div>
                        <div style="font-size:0.7rem; opacity:0.5;">Edge: ${edge.composite_score.toFixed(2)}</div>
                    </div>`;
            });

            // Update Active Positions & Open PnL
            const body = document.getElementById('suggested-body');
            body.innerHTML = '';
            let openPnL = 0;
            data.positions.forEach(pos => {
                const snap = data.snapshots.find(s => s.ticker === pos.ticker);
                const pnl = (snap.current_price - pos.entry_price) * pos.quantity;
                openPnL += pnl;
                body.innerHTML += `
                    <tr>
                        <td>${pos.ticker}</td>
                        <td>$${pos.entry_price.toFixed(2)}</td>
                        <td class="${pnl >= 0 ? 'positive' : 'negative'}">$${pnl.toFixed(2)}</td>
                    </tr>`;
                
                // Track history for chart
                if (!pnlHistory[pos.ticker]) pnlHistory[pos.ticker] = [];
                pnlHistory[pos.ticker].push(pnl);
            });

            document.getElementById('realized').textContent = `$${data.portfolio.total_realized.toFixed(2)}`;
            document.getElementById('open-pnl').textContent = `$${openPnL.toFixed(2)}`;
            document.getElementById('open-pnl').className = `stat-value ${openPnL >= 0 ? 'positive' : 'negative'}`;

            updateChart();
        }

        function updateChart() {
            const labels = Array.from({length: Math.max(...Object.values(pnlHistory).map(h => h.length), 0)}, (_, i) => i);
            pnlChart.data.labels = labels;
            pnlChart.data.datasets = Object.keys(pnlHistory).map(ticker => ({
                label: ticker,
                data: pnlHistory[ticker],
                borderColor: '#' + Math.floor(Math.random()*16777215).toString(16),
                tension: 0.3,
                pointRadius: 0
            }));
            pnlChart.update('none');
        }

        initChart();
        refreshAll();
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
